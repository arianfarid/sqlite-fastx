name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libsqlite_fastx.so
            target_name: linux-x86_64
            ext: so

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libsqlite_fastx.dylib
            target_name: macos-arm64
            ext: dylib

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libsqlite_fastx.dylib
            target_name: macos-x86_64
            ext: dylib

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sqlite_fastx.dll
            target_name: windows-x86_64
            ext: dll

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
             "sqlite_fastx-${{ github.ref_name }}-${{ matrix.target_name }}.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlite_fastx-${{ github.ref_name }}-${{ matrix.target_name }}
          path: sqlite_fastx-${{ github.ref_name }}-${{ matrix.target_name }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
